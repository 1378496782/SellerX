  <text x="200" y="330" fill="#333" font-family="Arial, sans-serif" font-size="18" font-weight="700">7494719439770389499</text>

  <rect x="638" y="116" width="510" height="278" rx="22" fill="#fff" filter="url(#shadow)"/>
  <text x="668" y="164" fill="#555" font-family="Arial, sans-serif" font-size="23" font-weight="700">⚙️ Configuration</text>
