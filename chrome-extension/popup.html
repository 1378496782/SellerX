<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SellerX</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <div class="header-left">
                <h1 class="title">📦 SellerX</h1>
                <span id="versionInfo" class="version-text">版本: 1.1.4</span>
                <button id="toggleRightPanelBtn" class="btn btn-small log-toggle-btn">📜 显示日志</button>
            </div>
            <div class="header-right">
                <button id="checkUpdateBtn" class="btn btn-small">检查更新</button>
                <button id="contactAuthorBtn" class="icon-link contact-link" type="button" title="联系作者">
                    💬
                </button>
                <a href="https://github.com/1378496782/SellerX" target="_blank" class="github-link">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0013.47-7.59C13.71 14.53 16 11.54 16 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="two-column-layout">
            <!-- 左侧列 - 主要内容 -->
            <div class="left-column">

                <!-- 店铺信息和配置区域的并列布局 -->
                <div class="info-config-row">
                    <!-- 店铺信息 -->
                    <div class="info-section">
                        <h2>🏪 Shop Info</h2>
                        <div class="single-info-box">
                            <div class="info-item-full">
                                <span class="label">Shop Name:</span>
                                <span id="shopName" class="value-full">-</span>
                            </div>
                            <div class="info-item-full">
                                <span class="label">Shop Code:</span>
                                <span id="shopCode" class="value">-</span>
                            </div>
                            <div class="info-item-full">
                                <span class="label">Region:</span>
                                <span id="countryCode" class="value">-</span>
                            </div>
                            <div class="info-item-full">
                                <span class="label">Seller ID:</span>
                                <span id="sellerId" class="value-full">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- 配置区域 -->
                    <div class="config-section">
                        <h2>⚙️ Configuration</h2>

                        <div class="form-group">
                            <label for="promotionType">Promotion Type:</label>
                            <select id="promotionType">
                                <option value="1" selected>All Promotions</option>
                                <option value="2">Regular coupon</option>
                                <option value="3">Shipping Discount</option>
                                <option value="4">Product Discount</option>
                                <option value="5">Flash Sale</option>
                                <option value="5:15">Live Flash Deal</option>
                                <option value="6">Gift with Purchase</option>
                                <option value="7">Buy More Save More</option>
                                <option value="7:25">Buy X Get Y</option>
                                <option value="8">Bundle Deal</option>
                                <option value="9">Promo Code</option>
                                <option value="2:9">Live Voucher</option>
                                <option value="2:11">Shop New User Voucher</option>
                                <option value="2:12">Creator Voucher</option>
                                <option value="2:21">Follow Voucher</option>
                                <option value="2:24">Seller Review Voucher</option>
                                <option value="10">Early Bird</option>
                                <option value="11">SNS</option>
                                <option value="5:16">Creator LIVE deal</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>查询状态:</label>
                            <div class="status-tabs" id="tabsGroup">
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="all">
                                    <span>All</span>
                                </label>
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="active" checked>
                                    <span>Ongoing & Upcoming</span>
                                </label>
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="2">
                                    <span>Ongoing</span>
                                </label>
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="3">
                                    <span>Upcoming</span>
                                </label>
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="4">
                                    <span>Deactivated</span>
                                </label>
                                <label class="status-tab">
                                    <input type="radio" name="tab" value="5">
                                    <span>Ended</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group lane-config">
                            <div class="lane-panel">
                                <div class="lane-panel-header">
                                    <span class="lane-panel-title">环境</span>
                                    <span id="laneHeadersStatus" class="lane-status">Prod（线上）</span>
                                </div>
                                <div class="lane-input-row">
                                    <label class="lane-field" for="laneEnvInput">
                                        <span>x-tt-env</span>
                                        <input id="laneEnvInput" type="text" placeholder="留空则使用 Prod">
                                    </label>
                                    <label class="lane-field" for="laneUsePpeInput">
                                        <span>x-use-ppe</span>
                                        <input id="laneUsePpeInput" type="text" placeholder="PPE 时填 1">
                                    </label>
                                </div>
                                <div class="lane-actions">
                                    <button id="saveLaneHeadersBtn" type="button" class="mini-btn">保存</button>
                                    <button id="clearLaneHeadersBtn" type="button" class="mini-btn">清空</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-section">
                    <button id="queryBtn" class="btn btn-primary">🔍 查询活动</button>
                    <button id="deleteBtn" class="btn btn-danger" disabled>🗑️ 全部删除</button>
                </div>

                <!-- 活动列表 -->
                <div class="list-section">
                    <h2>📋 活动列表</h2>
                    <div id="promotionList" class="promotion-list">
                        <p class="empty-text">请先点击"查询活动"按钮</p>
                    </div>
                </div>

                <!-- 删除结果 -->
                <div class="result-section" id="resultSection" style="display: none;">
                    <h2>✅ 删除结果</h2>
                    <div id="deleteResult" class="result-content"></div>
                </div>
            </div>

            <!-- 右侧列 - 日志区域 -->
            <div class="right-column" id="rightColumn">
                <div class="log-section">
                    <div class="log-title-row">
                        <h2>📜 执行日志</h2>
                        <button id="hideLogPanelBtn" class="panel-hide-btn" type="button">隐藏</button>
                    </div>
                    <div id="logContainer" class="log-container">
                        <p class="empty-text">等待执行操作...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <span>处理中...</span>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>

</html>
